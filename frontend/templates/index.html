<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demon Cat Tamagotchi 😈🐱</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
    <div class="container">
        <!-- Главная страница игры -->
        <div id="mainScreen" class="screen active">
            <div class="header">
                <h1>Demon Cat Tamagotchi 😈🐱</h1>
                <p id="petName" class="pet-name">Демонический Кот</p>
            </div>

            <!-- Анимация кота -->
            <div class="pet-container">
                <canvas id="petCanvas" width="300" height="300"></canvas>
            </div>

            <!-- Показатели питомца -->
            <div class="stats-panel">
                <div class="stat">
                    <label>🍖 Голод</label>
                    <div class="stat-bar">
                        <div id="hungerBar" class="stat-fill"></div>
                    </div>
                    <span id="hungerValue">50</span>
                </div>
                <div class="stat">
                    <label>🧼 Чистота</label>
                    <div class="stat-bar">
                        <div id="cleanlinessBar" class="stat-fill"></div>
                    </div>
                    <span id="cleanlinessValue">50</span>
                </div>
                <div class="stat">
                    <label>😊 Настроение</label>
                    <div class="stat-bar">
                        <div id="moodBar" class="stat-fill"></div>
                    </div>
                    <span id="moodValue">70</span>
                </div>
                <div class="stat">
                    <label>⚡ Энергия</label>
                    <div class="stat-bar">
                        <div id="energyBar" class="stat-fill"></div>
                    </div>
                    <span id="energyValue">80</span>
                </div>
                <div class="stat">
                    <label>❤️ Здоровье</label>
                    <div class="stat-bar">
                        <div id="healthBar" class="stat-fill"></div>
                    </div>
                    <span id="healthValue">90</span>
                </div>
            </div>

            <!-- Кнопки управления -->
            <div class="controls">
                <button class="control-btn feed-btn" onclick="game.feedPet()">
                    <span>🍖</span>
                    <span>Кормить</span>
                </button>
                <button class="control-btn pet-btn" onclick="game.petPet()">
                    <span>🤲</span>
                    <span>Гладить</span>
                </button>
                <button class="control-btn wash-btn" onclick="game.washPet()">
                    <span>🛁</span>
                    <span>Мыть</span>
                </button>
                <button class="control-btn sleep-btn" onclick="game.sleepPet()">
                    <span>💤</span>
                    <span>Спать</span>
                </button>
            </div>

            <!-- Навигация на блокнот -->
            <div class="navigation">
                <button class="nav-btn sketch-btn" onclick="game.goToSketch()">
                    📔 Открыть скетчбук
                </button>
            </div>
        </div>

        <!-- Экран скетчбука -->
        <div id="sketchScreen" class="screen">
            <div class="sketch-header">
                <button class="back-btn" onclick="game.backToMain()">&larr; Назад</button>
                <h2>📔 Скетчбук</h2>
                <button class="new-sketch-btn" onclick="game.newSketch()" style="visibility: hidden;">Новый рисунок</button>
            </div>

            <!-- Список страниц скетчбука -->
            <div id="sketchList" class="sketch-list">
                <button class="create-sketch-btn" onclick="game.newSketch()">
                    ➕ Создать новый рисунок
                </button>
            </div>
        </div>

        <!-- Экран редактора рисования -->
        <div id="editorScreen" class="screen">
            <div class="editor-header">
                <button class="back-btn" onclick="game.backToSketchList()">&larr; К скетчбуку</button>
                <h2>🎨 Редактор рисования</h2>
                <button class="save-btn" onclick="game.saveSketch()">💾 Сохранить</button>
            </div>

            <div class="editor-container">
                <!-- Инструменты -->
                <div class="toolbar">
                    <div class="tool-group">
                        <label>Инструмент:</label>
                        <button id="brushTool" class="tool-btn active" onclick="game.editor.selectTool('brush')">🖌️ Кисть</button>
                        <button id="eraserTool" class="tool-btn" onclick="game.editor.selectTool('eraser')">🧹 Ластик</button>
                    </div>

                    <div class="tool-group">
                        <label>Размер:</label>
                        <input id="brushSize" type="range" min="1" max="50" value="5" onchange="game.editor.setBrushSize(this.value)">
                        <span id="sizeDisplay">5</span>
                    </div>

                    <div class="tool-group">
                        <label>Цвет:</label>
                        <input id="colorPicker" type="color" value="#000000" onchange="game.editor.setColor(this.value)">
                    </div>

                    <div class="tool-group">
                        <button class="action-btn" onclick="game.editor.undo()">↶ Отмена</button>
                        <button class="action-btn" onclick="game.editor.redo()">↷ Повтор</button>
                        <button class="action-btn" onclick="game.editor.clear()">🗑️ Очистить</button>
                    </div>
                </div>

                <!-- Canvas для рисования -->
                <div class="canvas-wrapper">
                    <canvas id="drawingCanvas" width="600" height="400"></canvas>
                </div>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='game.js') }}"></script>
</body>
</html>
